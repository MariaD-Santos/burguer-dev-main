<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    /* Fonte importada para manter o estilo tech, mas combinando com a logo */
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;600&display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        /* Fundo baseado no verde-petróleo escuro da imagem */
        background-color: #0d1f23; 
        background-image: 
            linear-gradient(rgba(255, 184, 0, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 184, 0, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        font-family: 'Poppins', sans-serif;
    }

    form {
        /* Gradiente entre o marrom da logo e o fundo escuro */
        background: linear-gradient(145deg, #2b120a, #0d1f23);
        padding: 3rem;
        border-radius: 8px; /* Leve arredondamento para um ar moderno */
        /* Bordas com as cores principais: Marrom e Amarelo DevBurger */
        border-left: 4px solid #721c00; 
        border-right: 4px solid #ffb800;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        width: 400px;
        position: relative;
    }

    /* Linha decorativa superior em Amarelo/Laranja */
    form::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 3px;
        background: linear-gradient(90deg, transparent, #ffb800, transparent);
    }

    h1 {
        color: #ffffff;
        font-family: 'Orbitron', sans-serif;
        font-size: 1.2rem;
        margin-bottom: 2rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-align: center;
    }

    /* Destaque para a palavra Code&Flavor no título */
    h1 .flavor {
        color: #ffb800;
        display: block;
        font-size: 1.5rem;
    }

    .label {
        color: #ffb800 !important; /* Amarelo da marca */
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 0.5rem;
    }

    .input {
        background: rgba(0, 0, 0, 0.3) !important;
        border: 1px solid #4a2b20 !important; /* Marrom suave */
        border-radius: 4px !important;
        color: #fff !important;
        height: 45px;
        transition: all 0.3s ease;
    }

    .input:focus {
        border-color: #ffb800 !important;
        box-shadow: 0 0 10px rgba(255, 184, 0, 0.2) !important;
    }

    .input::placeholder {
        color: #666;
    }

    .button.is-link {
        background: #721c00 !important; /* Marrom da logo */
        border: none !important;
        color: #ffb800 !important; /* Texto amarelo */
        width: 100%;
        height: 50px;
        text-transform: uppercase;
        font-family: 'Orbitron', sans-serif;
        font-weight: bold;
        letter-spacing: 2px;
        transition: all 0.3s;
        margin-top: 1rem;
    }

    .button.is-link:hover {
        background: #ffb800 !important;
        color: #2b120a !important;
        box-shadow: 0 0 20px rgba(255, 184, 0, 0.4);
        transform: translateY(-2px);
    }

    /* Ajuste de ícones se você decidir usá-los */
    .help {
        color: #aaa;
    }
</style>
</head>

<body>

  <form action="/login/post" method="post">
    <h1>Logue-se na Code&Flavor</h1>
    <div class="field">
      <label class="label">Usuário</label>
      <div class="control">
        <input class="input" type="text" name="usuario" placeholder="Digite seu usuário:" id="usuario">
      </div>
    </div>

    <div class="field">
      <label class="label">Senha</label>
      <div class="control has-icons-left has-icons-right">
        <input name="senha" class="input is-text" type="textd" placeholder="Digite sua senha:" id="senha">
      </div>
    </div>
    <div class="field is-grouped">
      <div class="control">
        <button type="submit" class="button is-link">Logar</button>
      </div>
    </div>
  </form>
</body>

</html>
